<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0F1117" />
  <meta name="description" content="BPSC Teacher Recruitment Exam – Offline Progress Tracker" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BPSC Tracker" />

  <title>BPSC Exam Tracker</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />

  <!-- Inline SVG gradient for ring chart -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%"   stop-color="#6C63FF"/>
        <stop offset="100%" stop-color="#4ECDC4"/>
      </linearGradient>
    </defs>
  </svg>
</head>
<body>

<!-- Install Banner (hidden by default, shown by JS) -->
<div id="install-banner" class="hidden">
  <span>🚀 Install for offline use!</span>
  <div style="display:flex;gap:10px;">
    <button onclick="installApp()">Install</button>
    <button class="dismiss" onclick="this.parentElement.parentElement.classList.add('hidden')">×</button>
  </div>
</div>

<!-- ── App Header (Dynamic) ────────────────────────────── -->
<header id="app-header"></header>

<!-- ── Desktop Tabs ────────────────────────────────────── -->
<div class="tabs-bar">
  <button class="tab-btn active" data-tab="topics">📋 Topics</button>
  <button class="tab-btn" data-tab="dashboard">📊 Dashboard</button>
</div>

<!-- ── Controls Bar (Topics view only) ────────────────── -->
<div class="controls-bar" id="controls-bar">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="pending">Pending</button>
  <button class="filter-btn" data-filter="done">Completed</button>
  <div class="controls-right">
    <button class="sm-btn" id="expand-all">Expand All</button>
    <button class="sm-btn" id="collapse-all">Collapse</button>
  </div>
</div>

<!-- ── Main Content ────────────────────────────────────── -->
<main id="main-content">
  <div id="topics-container"></div>
</main>

<!-- ── Mobile Bottom Nav ───────────────────────────────── -->
<nav class="bottom-nav">
  <button class="tab-btn active" data-tab="topics">
    <span class="nav-icon">📋</span>
    <span>Topics</span>
  </button>
  <button class="tab-btn" data-tab="dashboard">
    <span class="nav-icon">📊</span>
    <span>Dashboard</span>
  </button>
</nav>

<script src="script.js"></script>

<script>
  // ── PWA Install Prompt ──────────────────────────────────
  let deferredPrompt = null;

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const banner = document.getElementById('install-banner');
    banner.classList.remove('hidden');
  });

  document.getElementById('install-btn')?.addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      document.getElementById('install-banner').classList.add('hidden');
    }
  });

  document.getElementById('dismiss-banner')?.addEventListener('click', () => {
    document.getElementById('install-banner').classList.add('hidden');
  });

  // ── Controls bar visibility ─────────────────────────────
  // Hide controls bar when on dashboard tab
  document.addEventListener('click', (e) => {
    const tabBtn = e.target.closest('.tab-btn');
    if (tabBtn) {
      const tab = tabBtn.dataset.tab;
      const bar = document.getElementById('controls-bar');
      if (bar) bar.style.display = (tab === 'dashboard') ? 'none' : '';
    }
  });
</script>
</body>
</html>
